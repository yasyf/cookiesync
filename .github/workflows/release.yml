name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Shared pipeline: verify-tag-on-main, goreleaser `release --clean` (with retries;
  # .goreleaser.yaml sets release.replace_existing_artifacts so a retry after a partial
  # publish is idempotent), and the cookiesync cask push to yasyf/homebrew-tap. The
  # default quill/ubuntu path fits: the CLI is pure Go, and .goreleaser.yaml's notarize
  # block reads the same MACOS_* env names the reusable workflow exports.
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@v1
    secrets: inherit

  detect-helper-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect whether helper/ changed since the previous v* tag
        id: diff
        run: |
          PREV=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then echo "changed=true" >> "$GITHUB_OUTPUT";
          elif git diff --quiet "$PREV" "${GITHUB_REF_NAME}" -- helper/ ':(exclude)helper/build/'; then echo "changed=false" >> "$GITHUB_OUTPUT";
          else echo "changed=true" >> "$GITHUB_OUTPUT"; fi

  # Builds and Developer-ID-signs cookiesync-keyhelper.app, then hands the verified
  # bundle to sign-notarize-app (notarize + staple + zip + attach to the same v*
  # release) and publishes the cookiesync-keyhelper cask to the shared tap. The signed
  # .app with an embedded provisioning profile + keychain-access-groups entitlement is
  # the ONLY form that clears the macOS 15/26 AMFI kill and authorizes the Secure
  # Enclave — an ad-hoc binary is SIGKILLed at exec. This costly build runs only when
  # helper/ changed since the previous tag (detect-helper-changes).
  #
  # Secure Enclave keygen cannot be validated here: CI macOS runners have no usable
  # Secure Enclave. SE validation happens on the user's real Mac after install.
  #
  # Depends on release so the v* release already exists before the attach step runs:
  # goreleaser owns release creation, and this job only ADDS the .app asset
  # (softprops, which updates an existing release). Without the ordering the two race
  # on the same tag.
  helper-build:
    needs: [release, detect-helper-changes]
    if: needs.detect-helper-changes.outputs.changed == 'true'
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Import Developer ID certificate
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@v1
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Decode the provisioning profile
        env:
          MACOS_PROVISION_PROFILE_COOKIESYNC: ${{ secrets.MACOS_PROVISION_PROFILE_COOKIESYNC }}
        run: |
          test -n "$MACOS_PROVISION_PROFILE_COOKIESYNC" || { echo "::error::MACOS_PROVISION_PROFILE_COOKIESYNC secret is empty"; exit 1; }
          echo -n "$MACOS_PROVISION_PROFILE_COOKIESYNC" | base64 --decode > "$RUNNER_TEMP/embedded.provisionprofile"
          echo "PROFILE_FILE=$RUNNER_TEMP/embedded.provisionprofile" >> "$GITHUB_ENV"

      # Signing stays bespoke (sign: "false" below): both codesign passes must carry
      # the keychain-access-groups entitlements build-app.sh materializes, and the
      # SE-critical assertions have no shared-action home.
      - name: Build and Developer-ID-sign the helper .app
        run: |
          # Assemble the bundle: compiles main.swift into Contents/MacOS, copies
          # Info.plist + the provisioning profile, and writes
          # build/cookiesync-keyhelper.entitlements with $(TEAM_ID) substituted.
          APP="$(bash helper/build-app.sh "$TEAM_ID" "$PROFILE_FILE")"
          ENTITLEMENTS="helper/build/cookiesync-keyhelper.entitlements"
          BINARY="$APP/Contents/MacOS/cookiesync-keyhelper"
          test -f "$BINARY"
          test -f "$APP/Contents/embedded.provisionprofile"
          test -f "$ENTITLEMENTS"
          # The entitlements must carry the Team ID, not the unsubstituted template.
          grep -q "$TEAM_ID.com.yasyf.cookiesync.helper" "$ENTITLEMENTS"

          # Sign inside-out: the inner Mach-O first, then the bundle. Hardened
          # runtime + secure timestamp + the keychain-access-groups entitlements on
          # both, so the embedded profile authorizes the SE keys and vault items.
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$MACOS_SIGN_IDENTITY" "$BINARY"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$MACOS_SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          # The DR must anchor to Developer ID (certificate 1[…6.2.6…]), never to a
          # bare root — a `root` anchor means the p12 lacked the Apple Root CA and
          # the bundle would be SIGKILLed at exec.
          codesign -d -r- "$APP" 2>&1 | grep -q "field.1.2.840.113635.100.6.2.6"

          echo "HELPER_APP=$APP" >> "$GITHUB_ENV"

      - name: Notarize, staple, zip, and attach the .app
        id: app
        uses: yasyf/homebrew-tap/.github/actions/sign-notarize-app@v1
        with:
          app: ${{ env.HELPER_APP }}
          # github.ref_name supplies the vX.Y.Z, so the asset name stays
          # cookiesync-keyhelper-v#{version}-darwin.zip — the cask url depends on it.
          name: cookiesync-keyhelper
          sign: "false"
          # goreleaser already generated the notes when it created the release; this
          # job only adds the .app asset, so it must not regenerate the body.
          release-notes: "false"

      # Only real, non-prerelease v* tags publish the cask: a `-`-bearing tag
      # (e.g. v1.0.0-rc1) ships a prerelease asset that must not become the tap's
      # `latest`.
      - name: Render the cask
        if: ${{ !contains(github.ref_name, '-') }}
        uses: yasyf/homebrew-tap/.github/actions/render-formula@v1
        with:
          template: .github/cask/cookiesync-keyhelper.rb.tmpl
          output: Casks/cookiesync-keyhelper.rb
          substitutions: |
            __SHA_APP__=${{ steps.app.outputs.sha256 }}

      - name: Publish the cask to the tap
        if: ${{ !contains(github.ref_name, '-') }}
        uses: yasyf/homebrew-tap/.github/actions/publish@v1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cookiesync-keyhelper ${{ github.ref_name }}"
