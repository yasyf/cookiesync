name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify the tag is on main
        uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify source
        run: |
          set -euo pipefail
          go mod verify
          go vet ./...
          go test -race ./...
          CGO_ENABLED=0 go build ./...

      - name: Require every release credential
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          for name in \
            MACOS_SIGN_P12 \
            MACOS_SIGN_PASSWORD \
            MACOS_NOTARY_KEY \
            MACOS_NOTARY_KEY_ID \
            MACOS_NOTARY_ISSUER_ID \
            HOMEBREW_TAP_TOKEN; do
            test -n "${!name}" || { echo "::error::required secret $name is empty"; exit 1; }
          done

      - name: Import Developer ID certificate
        id: developer-id
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Verify Developer ID import
        env:
          SIGNED: ${{ steps.developer-id.outputs.signed }}
          IDENTITY: ${{ steps.developer-id.outputs.identity }}
          TEAM_ID: ${{ steps.developer-id.outputs.team-id }}
        run: |
          set -euo pipefail
          test "$SIGNED" = true
          test -n "$IDENTITY"
          test -n "$TEAM_ID"
          case "$IDENTITY" in
            *"($TEAM_ID)") ;;
            *) echo "::error::Developer ID identity '$IDENTITY' does not match Team ID '$TEAM_ID'"; exit 1 ;;
          esac

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Build, sign, and notarize CLI assets without publishing
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          attempt=1
          while :; do
            if goreleaser release --clean --skip=publish; then
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::goreleaser build failed after 3 attempts"
              exit 1
            fi
            echo "::warning::goreleaser build failed (attempt $attempt/3); retrying in $((attempt * 60))s"
            sleep "$((attempt * 60))"
            attempt=$((attempt + 1))
          done

      - name: Build the universal cookiesync binary
        id: build
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ldflags="-s -w -X main.version=${version}"
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags "$ldflags" -o dist/cookiesync-arm64 .
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags "$ldflags" -o dist/cookiesync-amd64 .
          lipo -create -output dist/cookiesync dist/cookiesync-arm64 dist/cookiesync-amd64
          archs="$(lipo -archs dist/cookiesync)"
          grep -qw arm64 <<< "$archs"
          grep -qw x86_64 <<< "$archs"
          dist/cookiesync --version | grep -Fq "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "binary=$PWD/dist/cookiesync" >> "$GITHUB_OUTPUT"

      - name: Wrap the CLI in CookieSync.app
        id: wrap
        uses: yasyf/homebrew-tap/.github/actions/wrap-daemon-bundle@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          binary: ${{ steps.build.outputs.binary }}
          bundle-id: com.github.yasyf.cookiesync
          bundle-name: CookieSync
          executable-name: cookiesync
          version: ${{ steps.build.outputs.version }}

      - name: Package and smoke-test CookieSync.app
        id: app
        env:
          BUNDLE: ${{ steps.wrap.outputs.bundle-path }}
        run: |
          set -euo pipefail
          zip="dist/CookieSync-${GITHUB_REF_NAME}-darwin.zip"
          ditto -c -k --keepParent "$BUNDLE" "$zip"
          base="$(basename "$zip")"
          (
            cd dist
            shasum -a 256 "$base" > "$base.sha256"
            shasum -a 256 -c "$base.sha256"
          )
          sha="$(shasum -a 256 "$zip" | awk '{print $1}')"

          smoke="$RUNNER_TEMP/local-app-smoke"
          rm -rf "$smoke"
          mkdir -p "$smoke"
          ditto -x -k "$zip" "$smoke"
          test "$(find "$smoke" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" = 1
          app="$smoke/CookieSync.app"
          test -d "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
          "$app/Contents/MacOS/cookiesync" --version | grep -Fq "${GITHUB_REF_NAME#v}"

          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Render the cask
        if: ${{ !contains(github.ref_name, '-') }}
        uses: yasyf/homebrew-tap/.github/actions/render-formula@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          template: .github/cask/cookiesync.rb.tmpl
          output: Casks/cookiesync.rb
          substitutions: |
            __SHA_APP__=${{ steps.app.outputs.sha256 }}

      - name: Record the exact release asset manifest
        id: manifest
        env:
          TAG: ${{ github.ref_name }}
          APP_ZIP: ${{ steps.app.outputs.zip }}
        run: |
          set -euo pipefail
          app_sidecar="${APP_ZIP}.sha256"
          assets=(
            dist/checksums.txt
            dist/cookiesync_darwin_amd64.tar.gz
            dist/cookiesync_darwin_arm64.tar.gz
            "$APP_ZIP"
            "$app_sidecar"
          )
          for asset in "${assets[@]}"; do test -f "$asset"; done
          manifest="$RUNNER_TEMP/cookiesync-release-assets"
          printf '%s\n' "${assets[@]}" > "$manifest"
          test "$(wc -l < "$manifest" | tr -d ' ')" = 5

          core="${TAG%%+*}"
          prerelease=false
          if [[ "$core" == *-* ]]; then prerelease=true; fi
          {
            echo "path=$manifest"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Stage and verify the complete draft release
        id: stage
        uses: yasyf/homebrew-tap/.github/actions/stage-draft-release@e4c3108e693681df1a3c666bae80e890bc44cf3e
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          manifest: ${{ steps.manifest.outputs.path }}
          title: ${{ github.ref_name }}
          prerelease: ${{ steps.manifest.outputs.prerelease }}

      - name: Verify signatures and checksums from the exact staged release
        env:
          TAG: ${{ github.ref_name }}
          APP_ZIP: ${{ steps.app.outputs.zip }}
          TEAM_ID: ${{ steps.developer-id.outputs.team-id }}
          DOWNLOAD_DIR: ${{ steps.stage.outputs['download-dir'] }}
        run: |
          set -euo pipefail
          downloaded="$DOWNLOAD_DIR"
          app_sidecar="${APP_ZIP}.sha256"
          (
            cd "$downloaded"
            shasum -a 256 -c checksums.txt
            shasum -a 256 -c "$(basename "$app_sidecar")"
          )

          cli_smoke="$RUNNER_TEMP/downloaded-cli-smoke"
          rm -rf "$cli_smoke"
          mkdir -p "$cli_smoke/amd64" "$cli_smoke/arm64"
          tar -xzf "$downloaded/cookiesync_darwin_amd64.tar.gz" -C "$cli_smoke/amd64"
          tar -xzf "$downloaded/cookiesync_darwin_arm64.tar.gz" -C "$cli_smoke/arm64"
          for binary in "$cli_smoke/amd64/cookiesync" "$cli_smoke/arm64/cookiesync"; do
            codesign --verify --strict --verbose=2 "$binary"
            codesign -dvvv "$binary" 2>&1 | grep -Fq "TeamIdentifier=$TEAM_ID"
          done
          case "$(uname -m)" in
            arm64) native=arm64 ;;
            x86_64) native=amd64 ;;
            *) echo "::error::unsupported release runner architecture $(uname -m)"; exit 1 ;;
          esac
          "$cli_smoke/$native/cookiesync" --version | grep -Fq "${TAG#v}"

          app_smoke="$RUNNER_TEMP/downloaded-app-smoke"
          rm -rf "$app_smoke"
          mkdir -p "$app_smoke"
          ditto -x -k "$downloaded/$(basename "$APP_ZIP")" "$app_smoke"
          test "$(find "$app_smoke" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" = 1
          app="$app_smoke/CookieSync.app"
          test -d "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
          "$app/Contents/MacOS/cookiesync" --version | grep -Fq "${TAG#v}"

      - name: Publish the verified release
        uses: yasyf/homebrew-tap/.github/actions/publish-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          release-id: ${{ steps.stage.outputs['release-id'] }}
          tag: ${{ github.ref_name }}
          manifest: ${{ steps.manifest.outputs.path }}
          prerelease: ${{ steps.manifest.outputs.prerelease }}
          make-latest: ${{ steps.manifest.outputs.prerelease == 'false' }}

      - name: Publish the cask to the tap
        if: ${{ steps.manifest.outputs.prerelease == 'false' }}
        uses: yasyf/homebrew-tap/.github/actions/publish@9ca67392d45d66b6ae01e262383c8f3138d56f5e
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cookiesync ${{ github.ref_name }}"
