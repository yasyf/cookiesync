# goreleaser config — https://goreleaser.com
version: 2

project_name: cookiesync

before:
  hooks:
    - go mod tidy

builds:
  - id: cookiesync
    env:
      # modernc.org/sqlite is pure Go, so the darwin binaries cross-compile with no
      # C toolchain — CGO stays off and arm64 builds from the amd64 runner cleanly.
      - CGO_ENABLED=0
    # macOS only: cookiesync drives Safe Storage, Touch ID, the Secure Enclave,
    # launchd, and ioreg, none of which exist off darwin.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

# Developer-ID sign + notarize the darwin binaries so Gatekeeper clears the CLI on
# first launch, gated on the MACOS_* secrets (no-op when unset). This block covers
# the Go binary only; the Touch ID helper ships from the separate authkit cask.
notarize:
  macos:
    - enabled: '{{ if envOrDefault "MACOS_SIGN_P12" "" }}true{{ else }}false{{ end }}'
      ids:
        - cookiesync
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# No homebrew_casks block: the cookiesync cask ships a signed, notarized, stapled
# CookieSync.app (assembled by release.yml's app-build job via the shared
# wrap-daemon-bundle tap action) and symlinks the CLI to the bundle-inner binary, so
# every exec earns a DURABLE, CFBundleIdentifier-keyed TCC grant instead of the
# path-keyed one a bare Cellar binary re-prompts for on every upgrade. goreleaser can
# only serve a cask over its own archive artifacts (a bare Mach-O), so the cask is a
# hand-managed template (.github/cask/cookiesync.rb.tmpl) rendered + published from
# release.yml via the shared wrap-daemon-bundle → render-formula → publish tap pipeline.

release:
  # The shared release workflow retries `goreleaser release` on transient
  # failures; without this a retry after a partial publish 422s.
  replace_existing_artifacts: true
