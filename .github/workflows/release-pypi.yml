name: Release (PyPI)

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-pypi
  cancel-in-progress: false

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify the tagged commit is on main
        env:
          TAG_SHA: ${{ github.sha }}
        run: |
          git fetch --no-tags --quiet origin main
          if git merge-base --is-ancestor "$TAG_SHA" FETCH_HEAD; then
            echo "✓ ${GITHUB_REF_NAME} (${TAG_SHA}) is on main."
          else
            echo "::error title=Tag not on main::${GITHUB_REF_NAME} points at ${TAG_SHA}, which is not on main. Versioned releases must come from main — delete this tag, merge the commit to main, then re-tag the commit that landed on main."
            exit 1
          fi

  build:
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          cache-dependency-glob: uv.lock

      - name: Set version from tag
        run: uv version --frozen "${GITHUB_REF_NAME#v}"

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          --latest
          --repo "${{ github.repository }}"
          dist/*

  detect-helper-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect whether helper/ changed since the previous v* tag
        id: diff
        run: |
          PREV=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then echo "changed=true" >> "$GITHUB_OUTPUT";
          elif git diff --quiet "$PREV" "${GITHUB_REF_NAME}" -- helper/; then echo "changed=false" >> "$GITHUB_OUTPUT";
          else echo "changed=true" >> "$GITHUB_OUTPUT"; fi

  # Builds, Developer-ID-signs, notarizes, and staples cookiesync-keyhelper.app,
  # attaches the stapled bundle (zipped) to the same v* GitHub release, then
  # publishes the Homebrew cask (cookiesync-keyhelper) to the shared central tap
  # yasyf/homebrew-tap so `brew install yasyf/tap/cookiesync-keyhelper` (and
  # `cookiesync install`, which shells out to it) fetch the same asset. The signed
  # .app with an embedded provisioning profile + keychain-access-groups entitlement
  # is the ONLY form that clears the macOS 15/26 AMFI kill and authorizes the Secure
  # Enclave — an ad-hoc binary is SIGKILLed at exec. This costly build runs only when
  # helper/ changed since the previous tag (detect-helper-changes).
  #
  # Secure Enclave keygen cannot be validated here: CI macOS runners have no usable
  # Secure Enclave. SE validation happens on the user's real Mac after install.
  helper-build:
    needs: [verify-tag-on-main, detect-helper-changes]
    if: needs.detect-helper-changes.outputs.changed == 'true'
    runs-on: macos-15
    permissions:
      contents: write
    outputs:
      asset_tag: ${{ steps.pkg.outputs.asset_tag }}
      app_sha256: ${{ steps.pkg.outputs.app_sha256 }}
    steps:
      - uses: actions/checkout@v6

      - name: Import Developer ID certificate into a throwaway keychain
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo -n "$MACOS_SIGN_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_SIGN_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          # Add the throwaway keychain to the runner's search list so codesign finds
          # the identity. This runs ONLY on the CI runner — never do this on a dev
          # Mac, it locks the login keychain.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\" ]//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          # Derive the signing identity AND the Team ID from the cert — never hardcode.
          # The Team ID is the parenthesized suffix of "Developer ID Application: … (TEAMID)".
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          test -n "$IDENTITY" || { echo "::error::no Developer ID Application identity in the keychain"; exit 1; }
          TEAM_ID="$(printf '%s' "$IDENTITY" | sed -n 's/.*(\([A-Z0-9]*\))$/\1/p')"
          test -n "$TEAM_ID" || { echo "::error::could not derive Team ID from identity '$IDENTITY'"; exit 1; }
          echo "MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          echo "MACOS_NOTARY_KEY_FILE=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"
          # Mirror the reference env-var name nuance: KEY_ID stays KEY_ID, but the
          # ISSUER_ID secret is consumed as MACOS_NOTARY_ISSUER by notarytool below.
          echo "MACOS_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID" >> "$GITHUB_ENV"
          echo "MACOS_NOTARY_ISSUER=$MACOS_NOTARY_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Decode the provisioning profile
        env:
          MACOS_PROVISION_PROFILE_COOKIESYNC: ${{ secrets.MACOS_PROVISION_PROFILE_COOKIESYNC }}
        run: |
          test -n "$MACOS_PROVISION_PROFILE_COOKIESYNC" || { echo "::error::MACOS_PROVISION_PROFILE_COOKIESYNC secret is empty"; exit 1; }
          echo -n "$MACOS_PROVISION_PROFILE_COOKIESYNC" | base64 --decode > "$RUNNER_TEMP/embedded.provisionprofile"
          echo "PROFILE_FILE=$RUNNER_TEMP/embedded.provisionprofile" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and staple the helper .app
        id: pkg
        run: |
          # The release asset is versioned by the same v* tag that releases the
          # package, so the name reads cookiesync-keyhelper-vX.Y.Z-darwin.zip.
          # `cookiesync install` matches it by the cookiesync-keyhelper-*-darwin.zip glob.
          ASSET_TAG="${GITHUB_REF_NAME}"

          # Assemble the bundle: compiles main.swift into Contents/MacOS, copies
          # Info.plist + the provisioning profile, and writes
          # build/cookiesync-keyhelper.entitlements with $(TEAM_ID) substituted.
          APP="$(bash helper/build-app.sh "$TEAM_ID" "$PROFILE_FILE")"
          ENTITLEMENTS="helper/build/cookiesync-keyhelper.entitlements"
          BINARY="$APP/Contents/MacOS/cookiesync-keyhelper"
          test -f "$BINARY"
          test -f "$APP/Contents/embedded.provisionprofile"
          test -f "$ENTITLEMENTS"
          # The entitlements must carry the Team ID, not the unsubstituted template.
          grep -q "$TEAM_ID.com.yasyf.cookiesync.helper" "$ENTITLEMENTS"

          # Sign inside-out: the inner Mach-O first, then the bundle. Hardened
          # runtime + secure timestamp + the keychain-access-groups entitlements on
          # both, so the embedded profile authorizes the SE keys and vault items.
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$MACOS_SIGN_IDENTITY" "$BINARY"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" -s "$MACOS_SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          # The DR must anchor to Developer ID (certificate 1[…6.2.6…]), never to a
          # bare root — a `root` anchor means the p12 lacked the Apple Root CA and
          # the bundle would be SIGKILLed at exec.
          codesign -d -r- "$APP" 2>&1 | grep -q "field.1.2.840.113635.100.6.2.6"

          # Notarize the whole bundle (an .app can be stapled; a bare binary can't).
          # notarytool submit --wait exits 0 even on an Invalid result, so capture
          # the JSON and FAIL LOUD unless status == Accepted, printing the per-issue
          # log — the only place the rejection reason shows up.
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/cookiesync-keyhelper-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/cookiesync-keyhelper-notarize.zip" \
            --key "$MACOS_NOTARY_KEY_FILE" --key-id "$MACOS_NOTARY_KEY_ID" --issuer "$MACOS_NOTARY_ISSUER" \
            --wait --timeout 20m --output-format json > "$RUNNER_TEMP/notary-submit.json"
          cat "$RUNNER_TEMP/notary-submit.json"
          SUBMIT_ID="$(plutil -extract id raw -o - "$RUNNER_TEMP/notary-submit.json")"
          if [ "$(plutil -extract status raw -o - "$RUNNER_TEMP/notary-submit.json")" != "Accepted" ]; then
            xcrun notarytool log "$SUBMIT_ID" \
              --key "$MACOS_NOTARY_KEY_FILE" --key-id "$MACOS_NOTARY_KEY_ID" --issuer "$MACOS_NOTARY_ISSUER" || true
            echo "::error::notarization not Accepted for cookiesync-keyhelper.app (submission $SUBMIT_ID)"; exit 1
          fi

          # Staple the ticket so a quarantined install validates offline.
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

          # ditto -c -k preserves the bundle metadata a plain zip drops; zip the
          # STAPLED app so `cookiesync install` can fetch and verify it offline.
          mkdir -p dist
          ZIP="dist/cookiesync-keyhelper-${ASSET_TAG}-darwin.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          cat "$ZIP.sha256"

          # Hand the version + the .app checksum to the publish-cask job so the cask's
          # url (releases/download/<tag>/…) and sha256 match the asset just released.
          echo "asset_tag=${ASSET_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_sha256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Attach the stapled .app asset to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/cookiesync-keyhelper-*-darwin.zip
            dist/cookiesync-keyhelper-*-darwin.zip.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-cask:
    runs-on: ubuntu-latest
    needs: helper-build
    # Only real, non-prerelease v* tags publish the cask: a `-`-bearing tag
    # (e.g. v1.0.0-rc1) ships a prerelease asset that must not become the tap's
    # `latest`. Now that the tag no longer always contains a hyphen, the prerelease
    # gate keys on any `-` in the ref name.
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
    steps:
      # The cask lives in the shared external tap yasyf/homebrew-tap — the same tap that
      # serves reposync, cc-pool-status, etc. — so `brew install yasyf/tap/cookiesync-keyhelper`
      # works with no bespoke tap URL. The release asset still comes from THIS repo's GitHub
      # Releases (the url line points at github.com/yasyf/cookiesync/...). We render the .rb
      # into a local staging dir and hand it to the shared publish composite action, which
      # checks out the tap, copies the staging contents in, and commits/pushes (it no-ops
      # when nothing changed, so re-tagging the same version is idempotent). HOMEBREW_TAP_TOKEN
      # is a PAT with contents:write on yasyf/homebrew-tap; the default GITHUB_TOKEN cannot
      # push cross-repo.
      - name: Render the cookiesync-keyhelper Cask into the staging dir
        run: |
          VERSION="${GITHUB_REF_NAME#v}" # v1.2.3 -> 1.2.3
          APP_SHA="${{ needs.helper-build.outputs.app_sha256 }}"
          test -n "$VERSION" && test -n "$APP_SHA"

          mkdir -p tap-staging/Casks

          # The url interpolates #{version}, so only the version line + the `# app` sha
          # change per release. The release tag and the asset filename both carry the
          # v prefix (v#{version}; cookiesync-keyhelper-v#{version}).
          cat > tap-staging/Casks/cookiesync-keyhelper.rb <<RUBY
          # Homebrew cask for the cookiesync Secure-Enclave key helper (cookiesync-keyhelper.app).
          #
          # The .app is Developer ID signed, notarized, and stapled, so a normal quarantined
          # install clears Gatekeeper with no xattr/--no-quarantine hook. Install with
          # 'cookiesync install', or by hand:
          #
          #   brew install yasyf/tap/cookiesync-keyhelper
          #
          # The whole .app must stay intact — the embedded provisioning profile that
          # authorizes the Secure Enclave keychain-access-group is bundle-relative — so this
          # is an 'app' cask, never a bare 'binary' symlink to the inner executable.
          #
          # This file is GENERATED by cookiesync's release-pypi.yml publish-cask job and
          # pushed here on every tagged release — do not hand-edit; change the template
          # in cookiesync's .github/workflows/release-pypi.yml instead.
          cask "cookiesync-keyhelper" do
            version "${VERSION}"
            sha256 "${APP_SHA}" # app

            url "https://github.com/yasyf/cookiesync/releases/download/v#{version}/cookiesync-keyhelper-v#{version}-darwin.zip"
            name "cookiesync key helper"
            desc "Signed Secure-Enclave key helper for cookiesync (Touch ID-gated cookie decryption)"
            homepage "https://github.com/yasyf/cookiesync"

            depends_on macos: :ventura # parsed with a ">=" comparator: ventura or newer

            app "cookiesync-keyhelper.app"
          end
          RUBY

          # Fail loud if the interpolation produced something unexpected; allow idempotent
          # re-runs (re-tagging the same version is a no-op push).
          grep -q "version \"${VERSION}\"" tap-staging/Casks/cookiesync-keyhelper.rb
          grep -q "${APP_SHA}\" # app" tap-staging/Casks/cookiesync-keyhelper.rb
          grep -q 'app "cookiesync-keyhelper.app"' tap-staging/Casks/cookiesync-keyhelper.rb
          grep -q "download/v#{version}/cookiesync-keyhelper-v#{version}-darwin.zip" tap-staging/Casks/cookiesync-keyhelper.rb
          cat tap-staging/Casks/cookiesync-keyhelper.rb

      # The shared composite action checks out yasyf/homebrew-tap, merges the staging dir's
      # contents into the tap root, and commits/pushes (no-ops when nothing changed).
      - name: Publish the Cask to the shared tap
        uses: yasyf/homebrew-tap/.github/actions/publish@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cookiesync-keyhelper ${{ github.ref_name }}"
